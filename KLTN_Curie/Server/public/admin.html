<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Admin</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            font-family: 'Poppins', Arial, sans-serif;
            background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
            margin: 0;
            padding: 0;
        }
        .admin-container {
            width: 80%;
            max-width: 1400px;
            min-width: 1000px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .login-section, .admin-content {
            display: none;
        }
        .login-section.active, .admin-content.active {
            display: block;
        }
        .login-section h1 {
            color: #000000;
            text-align: center;
            padding: 12px 20px;
            margin: 20px auto;
            font-weight: bold;
            max-width: 600px;
            width: auto;
            white-space: nowrap;
            background: none !important;
            border-radius: 0 !important;
            box-shadow: none !important;
        }

        .admin-content h2 {
            background: #2c3e50;
            color: #ffffff;
            text-align: center;
            padding: 12px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(44, 62, 80, 0.3);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            margin: 20px auto;
        }
        .login-section form {
            max-width: 500px;
            width: 90%;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
            border-radius: 8px;
        }
        .login-section form div {
            margin-bottom: 15px;
        }
        .login-section label {
            display: block;
            margin-bottom: 5px;
            color: #2c3e50;
            font-weight: 600;
        }
        .login-section input {
            width: 100%;
            padding: 10px;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            font-size: 1rem;
        }
        .login-section button {
            width: 100%;
            padding: 10px;
            background-color: #2c3e50;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.3s;
        }
        .login-section button:hover {
            background-color: #1a252f;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .admin-table th, .admin-table td {
            padding: 12px;
            text-align: left;
            border: 1px solid #dee2e6;
        }
        .admin-table th {
            background-color: #e9ecef;
            font-weight: 600;
            color: #2c3e50;
        }
        .admin-table tr:nth-child(even) {
            background-color: #f8f9fa;
        }
        .admin-table button {
            background-color: #2c3e50;
            color: #ffffff;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin: 0 5px;
        }
        .admin-table button:hover {
            background-color: #1a252f;
        }
        .user-info-section {
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f5f5f5;
            border-radius: 8px;
            text-align: center;
        }
        .section-title {
            font-size: 1.3rem;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .update-button {
            background-color: #2c3e50;
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            margin-bottom: 10px;
            transition: background-color 0.3s;
        }
        .update-button:hover {
            background-color: #1a252f;
        }
        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #2c3e50;
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 6px;
            display: none;
            z-index: 1000;
        }
        #errorMessage {
            color: #e74c3c;
            text-align: center;
            margin-top: 10px;
        }
        .user-info {
            background: #2c3e50;
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        .user-info h2 {
            margin: 0 0 5px 0;
            font-size: 1.2rem;
        }
        .user-info p {
            margin: 0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div id="loginSection" class="login-section active">
            <h1>Đăng nhập quản lý tài khoản</h1>
            <form id="adminLoginForm">
                <div>
                    <label for="username">Tài khoản</label>
                    <input type="text" id="username" required>
                </div>
                <div>
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit">Đăng nhập</button>
            </form>
            <p id="errorMessage"></p>
        </div>

        <div id="adminContent" class="admin-content">
            <div class="user-info">
                <p>Tài khoản: <span id="userName"></span></p>
                <p>Quyền: <span id="userRole"></span></p>
            </div>

            <div>
                <h2 class="section-title">Quản lý người dùng</h2>
                <button class="update-button" onclick="fetchUsers()">Cập nhật danh sách</button>
                <table class="admin-table" id="userTable">
                    <thead>
                        <tr>
                            <th>Tên</th>
                            <th>Quyền</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <div>
                <h2 class="section-title">Người dùng đang hoạt động</h2>
                <button class="update-button" onclick="fetchActiveUsers()">Cập nhật</button>
                <p>Tổng số người dùng đang hoạt động: <span id="activeUserCount">0</span></p>
                <table class="admin-table" id="activeUserTable">
                    <thead>
                        <tr>
                            <th>Tên tài khoản</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <button class="update-button" onclick="logout()">Quay lại</button>
        </div>
    </div>

    <div id="toast"></div>
    <script type="module" src="/js/config.js"></script>
    <script type="module" src="/js/admin.js"></script>
</body>
</html>
