<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Căn giữa toàn bộ trang và sử dụng font lớn hơn */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
      font-family: Arial, sans-serif;
      font-size: 16px;
    }
    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    label {
      font-size: 16px;
      color: #2c3e50;
      font-weight: 500;
      text-align: left;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 16px;
      box-sizing: border-box;
      transition: border-color 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #2c3e50;
    }
    button {
      background-color: #2c3e50;
      color: #ffffff;
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    button:hover {
      background-color: #333333;
    }
    #message {
	  text-align: center;
      color: #e74c3c;
      font-size: 16px;
      min-height: 20px;
    }
    /* Định dạng phần toggle với hai phần riêng biệt */
	#formTitle {
	  text-align: center;
	  font-size: 26px;
	  font-weight: bold;
	  margin: 20px auto;
	  color: #000000;
	  padding: 12px 20px;
	}
    #toggleText {
      font-size: 16px;
      color: #2c3e50;
      margin-top: 10px;
      text-align: center;
    }
    #toggleText a {
      color: #27ae60;
      text-decoration: none;
      font-weight: 500;
      margin-left: 4px;
    }
    #toggleText a:hover {
      text-decoration: underline;
    }
    /* Container CAPTCHA: đặt ô nhập và hộp hiển thị mã trên 1 dòng */
    #captchaContainer {
      display: none;  /* Hiển thị khi ở chế độ Đăng ký */
      flex-wrap: nowrap;
      gap: 8px;
      align-items: center;
    }
    /* Ô nhập CAPTCHA giảm kích thước cho gọn */
    #captchaAnswer {
      width: 140px;
      padding: 6px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
    /* Hộp hiển thị CAPTCHA được điều chỉnh cho hài hòa */
    #captchaBox {
      padding: 8px 12px;
      min-width: 150px;
      min-height: 40px;
      border: 1px solid #333;
      border-radius: 6px;
      background-color: #f8f9fa;
      font-weight: bold;
      font-size: 16px;
      text-align: center;
      position: relative;
    }
    /* Nút làm mới CAPTCHA (đặt trong góc phải của captchaBox) */
	#refreshCaptcha {
	  position: absolute;
	  top: 50%;
	  right: 4px;
	  transform: translateY(-50%);
	  background: none;
	  border: none;
	  color: #000;    /* Đổi màu thành đen */
	  font-size: 14px; /* Có thể tăng lên nếu muốn icon lớn hơn, ví dụ 16px */
	  cursor: pointer;
	  padding: 2px 4px;
	}

    /* Popup đổi mật khẩu */
    #changePasswordPopup {
      display: none;
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }
    .popup-content {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
      position: relative;
      width: 80%;
      max-width: 400px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 24px;
      cursor: pointer;
    }
    .popup-content h2 {
      margin-top: 25px;
      margin-bottom: 20px;
    }
    @media (max-width: 400px) {
      .login-container {
        padding: 15px;
      }
      input, button {
        font-size: 14px;
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="container login-container">
    <h2 id="formTitle">Đăng nhập</h2>
    <form id="authForm">
      <div class="input-group">
        <label for="username">Tên người dùng:</label>
        <input type="text" id="username" required>
      </div>
      <div class="input-group">
        <label for="password">Mật khẩu:</label>
        <input type="password" id="password" required>
      </div>
      <!-- Container CAPTCHA (chỉ hiển thị khi đăng ký) -->
      <div id="captchaContainer">
	  <input type="text" id="captchaAnswer" placeholder="Nhập CAPTCHA">
	  <div id="captchaBox">
		<span id="captchaQuestion">Đang tải CAPTCHA...</span>
		<button type="button" id="refreshCaptcha" title="Làm mới CAPTCHA">
		  <!-- Icon refresh (SVG) -->
		  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
			<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
		  </svg>
		</button>
	  </div>
	</div>

      <button type="submit" id="submitBtn">Đăng nhập</button>
    </form>
    <p id="message"></p>
    <!-- Toggle text: sẽ thay đổi dựa trên trạng thái đăng nhập/đăng ký -->
    <p id="toggleText">
      <span id="togglePrefix">Chưa có tài khoản?</span>
      <a href="#" id="toggleLink">Đăng ký</a>
    </p>
    <p id="changePasswordText" style="margin-top: 10px;">
      <a href="#" id="changePasswordLink" style="color: #27ae60; text-decoration: none; font-weight: 500;">Đổi mật khẩu</a>
    </p>
  </div>
  <div id="changePasswordPopup">
    <div class="popup-content">
      <span class="close-btn" id="closeChangePasswordPopup">×</span>
      <h2>Đổi mật khẩu</h2>
      <form id="changePasswordForm">
        <div class="input-group">
          <label for="changeUsername">Tên người dùng:</label>
          <input type="text" id="changeUsername" required>
        </div>
        <div class="input-group">
          <label for="oldPassword">Mật khẩu cũ:</label>
          <input type="password" id="oldPassword" required>
        </div>
        <div class="input-group">
          <label for="newPassword">Mật khẩu mới:</label>
          <input type="password" id="newPassword" required>
        </div>
        <div class="input-group">
          <label for="confirmPassword">Xác nhận mật khẩu mới:</label>
          <input type="password" id="confirmPassword" required>
        </div>
        <button type="submit" id="changePasswordBtn">Lưu thay đổi</button>
      </form>
    </div>
  </div>
  <script type="module" src="/js/config.js"></script>
  <script type="module" src="/js/auth.js"></script>
</body>
</html>
